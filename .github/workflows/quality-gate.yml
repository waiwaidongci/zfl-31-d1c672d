name: Quality Gate

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 1 - 检查 HTML 引用的 script/css 文件是否存在
        run: npm run check:html

      - name: 2 - 验证全局模块加载顺序与依赖
        run: npm run check:order

      - name: 3 - 运行核心逻辑单元测试
        run: npm run test
