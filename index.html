<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手工织锦纹样排版台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div><h1>手工织锦纹样排版台</h1><div>绘制经纬网格纹样，统计色线用量并保存方案。</div></div>
    <div class="toolbar toolbar-3"><button id="saveBtn">保存当前方案</button><button id="exportBtn" class="secondary">导出JSON</button><button id="importBtn" class="secondary">导入JSON</button></div>
  </header>
  <main class="app">
    <aside class="panel">
      <div class="scheme-header">
        <h2 style="margin:0;">命名方案库</h2>
        <button id="newSchemeBtn" class="secondary" style="padding:6px 10px;font-size:13px;">+ 新建</button>
      </div>
      <div class="scheme-list" id="schemeList"></div>

      <h2>画布</h2>
      <label>经向列数</label><input id="cols" type="number" value="18" min="6" max="36">
      <label>纬向行数</label><input id="rows" type="number" value="14" min="6" max="32">
      <button id="newBtn">新建网格</button>
      <h2>色线库</h2>
      <div class="palette" id="palette"></div>
      <h2>基础纹样块</h2>
      <div class="blocks">
        <button data-block="dot" class="secondary">单点</button>
        <button data-block="cross" class="secondary">十字</button>
        <button data-block="diamond" class="secondary">小菱形</button>
      </div>
    </aside>
    <section class="panel">
      <div class="view-toggle-bar">
        <button id="viewToggleBtn" class="secondary">织造工序视图</button>
        <button id="exportProcessBtn" class="secondary" style="display:none;">导出工序JSON</button>
      </div>
      <div class="grid" id="grid"></div>
    </section>
    <aside class="panel">
      <div id="templatePanel"></div>
      <h2>操作</h2>
      <div class="toolbar"><button id="undoBtn" class="secondary">撤销</button><button id="redoBtn" class="secondary">重做</button></div>
      <p>点击填色，按住拖动可连续填色。</p>
      <h2>用色统计</h2>
      <div class="stats" id="stats"></div>
      <h2>重复单元预览</h2>
      <div class="preview" id="preview"></div>
      <h2>断线风险</h2>
      <div id="risk"></div>
    </aside>
  </main>
  <script src="js/template-data.js"></script>
  <script src="js/template-apply.js"></script>
  <script src="js/template-ui.js"></script>
  <script src="js/process-calc.js"></script>
  <script src="js/process-view.js"></script>
  <script src="js/import-parser.js"></script>
  <script src="js/import-validator.js"></script>
  <script src="js/import-writer.js"></script>
  <script src="js/import-dialog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
