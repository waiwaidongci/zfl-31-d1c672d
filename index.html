<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手工织锦纹样排版台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/batch-toolbar.css">
  <link rel="stylesheet" href="css/compare.css">
  <link rel="stylesheet" href="css/export-preview.css">
  <link rel="stylesheet" href="css/blocks.css">
  <link rel="stylesheet" href="css/version-timeline.css">
</head>
<body>
  <header>
    <div><h1>手工织锦纹样排版台</h1><div>绘制经纬网格纹样，统计色线用量并保存方案。</div></div>
    <div class="toolbar toolbar-6">
      <button id="saveBtn">保存当前方案</button>
      <button id="exportBtn" class="secondary">导出方案JSON</button>
      <button id="exportSvgBtn" class="secondary">导出SVG</button>
      <button id="importBtn" class="secondary">导入方案JSON</button>
      <button id="exportPackageBtn" class="secondary">📦 导出项目包</button>
      <button id="importPackageBtn" class="secondary">📦 导入项目包</button>
    </div>
  </header>
  <main class="app">
    <aside class="panel">
      <div class="scheme-header">
        <h2 style="margin:0;">命名方案库</h2>
        <button id="newSchemeBtn" class="secondary" style="padding:6px 10px;font-size:13px;">+ 新建</button>
      </div>
      <div class="scheme-filter" id="schemeFilter"></div>
      <div class="scheme-list" id="schemeList"></div>

      <h2>画布</h2>
      <label>经向列数</label><input id="cols" type="number" value="18" min="6" max="36">
      <label>纬向行数</label><input id="rows" type="number" value="14" min="6" max="32">
      <button id="newBtn">新建网格</button>
      <div id="threadPanel"></div>
      <h2>基础纹样块</h2>
      <div class="blocks-container"></div>
    </aside>
    <section class="panel">
      <div class="view-toggle-bar">
        <button id="viewToggleBtn" class="secondary">织造工序视图</button>
        <button id="exportProcessBtn" class="secondary" style="display:none;">导出工序JSON</button>
      </div>
      <div class="workspace-toggle-bar">
        <button id="workspaceEditBtn" class="workspace-toggle-btn active">编辑工作区</button>
        <button id="workspaceCompareBtn" class="workspace-toggle-btn">多方案对比</button>
      </div>
      <div id="editWorkspace">
        <div class="grid" id="grid"></div>
      </div>
      <div id="compareWorkspace" class="compare-workspace">
        <div id="compareSelector"></div>
        <div id="compareView" style="display:none;"></div>
      </div>
    </section>
    <aside class="panel">
      <div id="templatePanel"></div>
      <h2>操作</h2>
      <div class="toolbar"><button id="undoBtn" class="secondary">撤销</button><button id="redoBtn" class="secondary">重做</button></div>
      <p>点击填色，按住拖动可连续填色。</p>
      <h2>局部选择与批量编辑</h2>
      <div class="batch-toolbar">
        <button id="selectModeBtn" class="mode-btn paint-mode">切换到选择模式</button>
      </div>
      <div class="batch-actions">
        <button id="fillSelBtn" class="secondary" disabled>填色</button>
        <button id="clearSelBtn" class="secondary" disabled>清空</button>
        <button id="flipHSelBtn" class="secondary" disabled>水平翻转</button>
        <button id="flipVSelBtn" class="secondary" disabled>垂直翻转</button>
        <button id="copySelBtn" class="secondary" disabled>复制</button>
        <button id="pasteSelBtn" class="secondary" disabled>粘贴</button>
      </div>
      <div id="selectionInfo" class="selection-info" style="display:none;">已选 <span class="selection-size" id="selectionSize">0×0</span></div>
      <h2>用色统计</h2>
      <div class="stats" id="stats"></div>
      <h2>色线用量估算</h2>
      <div class="yarn-estimate-section">
        <div class="yarn-estimate-config">
          <button class="yarn-estimate-toggle secondary" id="yarnEstimateToggle">⚙ 用量参数设置</button>
          <div class="yarn-estimate-panel" id="yarnEstimatePanel" style="display:none;">
            <div class="yarn-estimate-item">
              <label>单格物理尺寸 (mm)</label>
              <input type="number" id="cellSizeMm" min="0.1" max="20" step="0.1" value="2.0">
              <p class="yarn-estimate-desc">每格对应的实际物理尺寸</p>
            </div>
            <div class="yarn-estimate-item">
              <label>经向密度 (格/cm)</label>
              <input type="number" id="warpDensity" min="0.5" max="50" step="0.5" value="5.0">
              <p class="yarn-estimate-desc">每厘米经向包含的格数</p>
            </div>
            <div class="yarn-estimate-item">
              <label>纬向密度 (格/cm)</label>
              <input type="number" id="weftDensity" min="0.5" max="50" step="0.5" value="5.0">
              <p class="yarn-estimate-desc">每厘米纬向包含的格数</p>
            </div>
            <div class="yarn-estimate-item">
              <label>默认损耗系数</label>
              <input type="number" id="defaultLossFactor" min="1.0" max="3.0" step="0.05" value="1.15">
              <p class="yarn-estimate-desc">织造过程中的线损耗倍率（1.15 = 15% 损耗）</p>
            </div>
            <div class="yarn-estimate-item">
              <label>默认安全余量 (%)</label>
              <input type="number" id="defaultSafetyMargin" min="0" max="100" step="1" value="10">
              <p class="yarn-estimate-desc">额外预留的安全余量百分比</p>
            </div>
            <div class="yarn-estimate-actions">
              <button class="secondary" id="resetYarnEstimate">恢复默认</button>
              <button class="primary" id="applyYarnEstimate">应用参数</button>
            </div>
          </div>
        </div>
        <div class="yarn-estimate-summary" id="yarnEstimateSummary"></div>
        <div class="yarn-estimate-list" id="yarnEstimateList"></div>
      </div>
      <h2>重复单元预览</h2>
      <div class="preview" id="preview"></div>
      <h2>断线风险</h2>
      <div id="risk"></div>
      <div class="risk-settings-section">
        <button class="risk-settings-toggle secondary" id="riskSettingsToggle">⚙ 风险规则设置</button>
        <div class="risk-settings-panel" id="riskSettingsPanel" style="display:none;">
          <div class="risk-settings-item">
            <label>高风险阈值</label>
            <div class="risk-slider-row">
              <input type="range" id="highRiskThreshold" min="0.3" max="0.95" step="0.01" value="0.62">
              <span class="risk-slider-value" id="highRiskThresholdValue">62%</span>
            </div>
            <p class="risk-settings-desc">换色密度超过此比例判定为高风险</p>
          </div>
          <div class="risk-settings-item">
            <label>中风险阈值</label>
            <div class="risk-slider-row">
              <input type="range" id="mediumRiskThreshold" min="0.1" max="0.7" step="0.01" value="0.35">
              <span class="risk-slider-value" id="mediumRiskThresholdValue">35%</span>
            </div>
            <p class="risk-settings-desc">换色密度超过此比例判定为中风险</p>
          </div>
          <div class="risk-settings-item">
            <label class="risk-checkbox-label">
              <input type="checkbox" id="countShortSegments">
              <span>将连续短色段计入风险</span>
            </label>
            <p class="risk-settings-desc">启用后，连续出现的短色段会额外增加风险权重</p>
          </div>
          <div class="risk-settings-item" id="shortSegmentMaxLengthItem" style="display:none;">
            <label>短色段最大长度</label>
            <div class="risk-slider-row">
              <input type="range" id="shortSegmentMaxLength" min="1" max="10" step="1" value="2">
              <span class="risk-slider-value" id="shortSegmentMaxLengthValue">2 格</span>
            </div>
            <p class="risk-settings-desc">长度小于等于此值的色段被视为短色段</p>
          </div>
          <div class="risk-settings-actions">
            <button class="secondary" id="resetRiskSettings">恢复默认</button>
          </div>
        </div>
      </div>
      <div id="versionTimeline"></div>
    </aside>
  </main>
  <script src="js/thread-model.js"></script>
  <script src="js/thread-store.js"></script>
  <script src="js/yarn-estimate.js"></script>
  <script src="js/stats-render.js"></script>
  <script src="js/selection-state.js"></script>
  <script src="js/batch-transform.js"></script>
  <script src="js/grid-interaction.js"></script>
  <script src="js/block-store.js"></script>
  <script src="js/block-editor.js"></script>
  <script src="js/block-ui.js"></script>
  <script src="js/template-data.js"></script>
  <script src="js/template-apply.js"></script>
  <script src="js/template-ui.js"></script>
  <script src="js/risk-config.js"></script>
  <script src="js/process-calc.js"></script>
  <script src="js/process-view.js"></script>
  <script src="js/import-parser.js"></script>
  <script src="js/import-validator.js"></script>
  <script src="js/import-writer.js"></script>
  <script src="js/import-dialog.js"></script>
  <script src="js/thread-panel.js"></script>
  <script src="js/compare-calc.js"></script>
  <script src="js/compare-selector.js"></script>
  <script src="js/compare-view.js"></script>
  <script src="js/svg-generator.js"></script>
  <script src="js/export-config.js"></script>
  <script src="js/export-preview.js"></script>
  <script src="js/storage-migration.js"></script>
  <script src="js/scheme-store.js"></script>
  <script src="js/state.js"></script>
  <script src="js/version-history.js"></script>
  <script src="js/version-timeline-ui.js"></script>
  <script src="js/grid-render.js"></script>
  <script src="js/scheme-ui.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/risk-settings-ui.js"></script>
  <script src="js/project-package.js"></script>
  <script src="js/project-package-dialog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
