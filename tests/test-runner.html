<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>回归测试 - zfl-31</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 24px;
      background: #fafafa;
      color: #222;
    }
    h1 { margin-top: 0; }
    .suite {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .suite-title {
      padding: 10px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
    }
    .case {
      padding: 8px 16px 8px 32px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .case:last-child { border-bottom: none; }
    .pass { color: #2a7c2f; }
    .fail { color: #c0392b; }
    .case .icon { margin-right: 6px; }
    .case .detail {
      display: block;
      margin-top: 4px;
      padding: 6px 10px;
      background: #fdf5f5;
      border-left: 3px solid #c0392b;
      color: #333;
      font-family: Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .summary {
      padding: 12px 16px;
      margin-top: 16px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
    }
    .summary.all-pass { background: #e8f5e9; color: #2a7c2f; }
    .summary.has-fail { background: #ffebee; color: #c0392b; }
  </style>
</head>
<body>
  <h1>🧪 回归测试</h1>
  <div id="results"></div>

  <script src="../js/storage-migration.js"></script>
  <script src="../js/thread-model.js"></script>
  <script src="../js/thread-store.js"></script>
  <script src="../js/yarn-estimate.js"></script>
  <script src="../js/risk-config.js"></script>
  <script src="../js/process-calc.js"></script>
  <script src="../js/block-store.js"></script>
  <script src="../js/scheme-store.js"></script>
  <script src="tests.js"></script>
</body>
</html>
